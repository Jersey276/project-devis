name: Backend CI

on:
  pull_request:
    paths:
      - "backend/auth/**"
    branches:
      - develop

permissions:
  contents: read
  packages: write
  pull-requests: read
jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            auth:
              - "backend/auth/**"

  ci-auth:
    needs: check-changes
    if: needs.check-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/auth
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Run tests with coverage
        id: tests
        run: |
          set -o pipefail
          go test -json -coverprofile=coverage.out ./... 2>&1 | tee test_output.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-auth
          path: backend/auth/coverage.out

      - name: Upload test results on failure
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-results-auth
          path: backend/auth/test_output.json
