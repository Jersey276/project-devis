name: Backend CI

on:
  pull_request:
    paths:
      - "backend/auth/**"
      - "backend/gateway/**"
      - "backend/users/**"
    branches:
      - dev

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            auth:
              - "backend/auth/**"
            users:
              - "backend/users/**"

  ci:
    needs: check-changes
    if: needs.check-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.check-changes.outputs.services) }}
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Run tests with coverage
        id: tests
        run: |
          set -o pipefail
          go test -json -coverprofile=coverage.out ./... 2>&1 | tee test_output.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/coverage.out

      - name: Upload test results on failure
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.service }}
          path: backend/${{ matrix.service }}/test_output.json
