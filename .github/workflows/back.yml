name: Backend CI

on:
  pull_request:
    paths:
      - "backend/auth/**"
      - "backend/users/**"
      - "backend/quote/**"
      - "backend/export/**"
      - "backend/schedule/**"
      - "backend/audit/**"
      - "backend/template/**"
      - "backend/gateway/**"
    branches:
      - dev

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            auth:
              - "backend/auth/**"
            users:
              - "backend/users/**"
            quote:
              - "backend/quote/**"
            export:
              - "backend/export/**"
            schedule:
              - "backend/schedule/**"
            audit:
              - "backend/audit/**"
            template:
              - "backend/template/**"
  ci:
    needs: check-changes
    if: needs.check-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.check-changes.outputs.services) }}
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      # The export service validates generated Factur-X against the official CII
      # XSD via xmllint; without it the conformance test silently skips.
      - name: Install xmllint (export only)
        if: matrix.service == 'export'
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      # The export service also runs the EN 16931 Schematron (business rules) via
      # the vendored Saxon-HE jar, which needs a JRE 11+; without it that
      # conformance test silently skips.
      - name: Set up JRE (export only — Schematron via Saxon)
        if: matrix.service == 'export'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run tests with coverage
        id: tests
        run: |
          set -o pipefail
          go test -json -coverprofile=coverage.out ./... 2>&1 | tee test_output.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/coverage.out

      - name: Upload test results on failure
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.service }}
          path: backend/${{ matrix.service }}/test_output.json
