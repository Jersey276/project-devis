name: Production pipeline

on:
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Quality gates (parallel front / back)
  # ---------------------------------------------------------------------------
  front-quality:
    name: Front quality (lint + audit + build + cypress)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Security audit (block on high/critical)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Upload Next build artifact
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: front/.next
          retention-days: 1
          include-hidden-files: true

      - name: Cypress run (mocked / no backend)
        uses: cypress-io/github-action@v4
        with:
          install: false
          start: npm run start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          browser: chrome
          working-directory: front

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-front-quality
          path: front/cypress/screenshots
          retention-days: 7

  back-quality:
    name: Back quality (lint + audit + tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, users, quote, gateway, export]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      - name: Lint (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-compliant:"
            echo "$unformatted"
            exit 1
          fi

      - name: Static analysis (go vet)
        run: go vet ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Security audit (govulncheck)
        run: govulncheck ./...

      - name: Run unit tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/coverage.out

  # ---------------------------------------------------------------------------
  # Build & push images to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    needs: [front-quality, back-quality]
    strategy:
      fail-fast: true
      matrix:
        image:
          - name: front
            context: ./front
            dockerfile: ./front/Dockerfile
            build_args: ""
          - name: gateway
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: "SERVICE_NAME=gateway"
          - name: auth
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: "SERVICE_NAME=auth"
          - name: users
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: "SERVICE_NAME=users"
          - name: quote
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: "SERVICE_NAME=quote"
          - name: export
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: "SERVICE_NAME=export"
    steps:
      - uses: actions/checkout@v6

      - name: Compute image name (lowercase)
        id: img
        run: |
          owner_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=${{ env.REGISTRY }}/${owner_repo}/${{ matrix.image.name }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          build-args: ${{ matrix.image.build_args }}
          tags: |
            ${{ steps.img.outputs.ref }}:${{ github.sha }}
            ${{ steps.img.outputs.ref }}:latest
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  # ---------------------------------------------------------------------------
  # Deploy to production server (SSH + docker compose pull/up)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin ${{ github.event.pull_request.head.sha }}
            git reset --hard ${{ github.event.pull_request.head.sha }}
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USER }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

  # ---------------------------------------------------------------------------
  # Auto-merge the PR once deployment succeeded
  # ---------------------------------------------------------------------------
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Merge pull request (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}
