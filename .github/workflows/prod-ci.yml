name: Production CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: read

jobs:
  # ---------------------------------------------------------------------------
  # Quality gates (parallel front / back)
  # ---------------------------------------------------------------------------
  front-quality:
    name: Front quality (lint + audit + build + cypress)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Security audit (block on high/critical)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Upload Next build artifact
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: front/.next
          retention-days: 1
          include-hidden-files: true

      - name: Cypress run (mocked / no backend)
        uses: cypress-io/github-action@v4
        with:
          install: false
          start: npm run start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          browser: chrome
          working-directory: front

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-front-quality
          path: front/cypress/screenshots
          retention-days: 7

  back-quality:
    name: Back quality (lint + audit + tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, users, quote, gateway, export]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      - name: Lint (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-compliant:"
            echo "$unformatted"
            exit 1
          fi

      - name: Static analysis (go vet)
        run: go vet ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Security audit (govulncheck)
        run: govulncheck ./...

      - name: Run unit tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/coverage.out

  # ---------------------------------------------------------------------------
  # End-to-end integration test (real backend, no mocks)
  # ---------------------------------------------------------------------------
  secret-gate:
    name: Secret availability gate
    runs-on: ubuntu-latest
    needs: [front-quality, back-quality]
    outputs:
      can_use_secrets: ${{ steps.gate.outputs.can_use_secrets }}
    steps:
      - name: Check whether repository secrets are available
        id: gate
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          ACTOR: ${{ github.actor }}
        run: |
          can_use_secrets=true
          reason=""

          if [ "$IS_FORK" = "true" ]; then
            can_use_secrets=false
            reason="pull_request from fork"
          elif [ "$ACTOR" = "dependabot[bot]" ]; then
            can_use_secrets=false
            reason="dependabot run has no repository secrets"
          elif [ -z "$POSTGRES_PASSWORD" ]; then
            can_use_secrets=false
            reason="POSTGRES_PASSWORD is empty or unavailable"
          fi

          echo "can_use_secrets=$can_use_secrets" >> "$GITHUB_OUTPUT"

          if [ "$can_use_secrets" = "false" ]; then
            echo "::notice::Skipping secret-dependent jobs: $reason"
          fi

  e2e-integration:
    name: E2E integration (Cypress vs real backend)
    runs-on: ubuntu-latest
    needs: [front-quality, back-quality, secret-gate]
    if: needs.secret-gate.outputs.can_use_secrets == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Provision Postgres secret file
        env:
          PGPASS: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          mkdir -p backend/secrets
          printf '%s' "$PGPASS" > backend/secrets/postgres_pswd.txt

      - name: Boot backend stack (docker compose up)
        working-directory: backend
        run: docker compose up -d --build

      - name: Wait for gateway to be ready
        working-directory: backend
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo 000)
            case "$code" in
              200|301|302|400|404|405)
                echo "Gateway is reachable on :8080 (HTTP $code)"
                exit 0
                ;;
            esac
            echo "Waiting for gateway... ($i/60) - last code: $code"
            sleep 2
          done
          echo "::error::Gateway did not become reachable within 120s"
          docker compose logs
          exit 1

      - name: Download Next build artifact
        uses: actions/download-artifact@v7
        with:
          name: next-build
          path: front/.next

      - name: Install front dependencies
        working-directory: front
        run: npm ci

      - name: Cypress run against real backend
        uses: cypress-io/github-action@v4
        with:
          install: false
          start: npm run start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          browser: chrome
          working-directory: front

      - name: Dump backend logs on failure
        if: failure()
        working-directory: backend
        run: docker compose logs

      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-e2e-failure
          path: |
            front/cypress/screenshots
            front/cypress/videos
          retention-days: 7

      - name: Tear down backend stack
        if: always()
        working-directory: backend
        run: docker compose down -v
