name: Frontend CI

on:
  pull_request:
    branches:
      - dev
    paths:
      - "front/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: cache-node_modules
        uses: actions/cache@v5
        with:
          path: |
            front/node_modules
            front/.next
            /home/runner/.cache/Cypress
          key: ${{ runner.os }}-node_modules-${{ hashFiles('front/package-lock.json') }}
      - run: |
          npm install
          npm run build
        working-directory: front
  test:
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        browser: ["chrome", "edge"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - id: cache-node_modules
        uses: actions/cache@v5
        with:
          path: |
            front/node_modules
            front/.next
            /home/runner/.cache/Cypress
          key: ${{ runner.os }}-node_modules-${{ hashFiles('front/package-lock.json') }}
      - name: Cypress run
        uses: cypress-io/github-action@v4
        with:
          install: false
          start: npm run start
          browser: ${{ matrix.browser }}
          working-directory: front
      - uses: actions/upload-artifact@v7
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: front/cypress/videos
          retention-days: 7
        if: always()
      - uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: front/cypress/screenshots
          retention-days: 7
        if: failure()
  audit:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: front
