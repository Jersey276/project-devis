syntax = "proto3";

package invoice;

option go_package = "gateway/invoice";

service InvoiceService {
    rpc CreateInvoiceFromSchedule(CreateInvoiceFromScheduleRequest) returns (CreateInvoiceResponse);
    rpc CreateInvoiceFromQuote(CreateInvoiceFromQuoteRequest) returns (CreateInvoiceResponse);
    rpc IssueInvoice(IssueInvoiceRequest) returns (CreateInvoiceResponse);
    rpc MarkInvoicePaid(MarkInvoicePaidRequest) returns (GenericResponse);
    // Delete a still-unissued invoice. Allowed only while DRAFT (no number, no
    // snapshot, no seal); an issued invoice stays immutable.
    rpc DeleteDraftInvoice(DeleteDraftInvoiceRequest) returns (GenericResponse);
    rpc GetInvoice(GetInvoiceRequest) returns (GetInvoiceResponse);
    rpc ListInvoices(ListInvoicesRequest) returns (ListInvoicesResponse);

    // Credit notes (avoirs). Crediting replaces invoice cancellation: it
    // neutralises part or all of an issued invoice without changing its status.
    rpc CreateCreditNote(CreateCreditNoteRequest) returns (CreateCreditNoteResponse);
    rpc GetCreditNote(GetCreditNoteRequest) returns (GetCreditNoteResponse);
    rpc ListCreditNotes(ListCreditNotesRequest) returns (ListCreditNotesResponse);

    // Inalterability: recompute and verify the issuer's seal chain.
    rpc VerifyChain(VerifyChainRequest) returns (VerifyChainResponse);

    // OSS distance-selling threshold status for the current civil year: where the
    // issuer stands against the EUR 10 000 threshold (art. 259 D CGI).
    rpc GetOSSThresholdStatus(GetOSSThresholdStatusRequest) returns (GetOSSThresholdStatusResponse);

    // E-invoicing lifecycle (réforme FR B2B). Orthogonal to the business status:
    // tracks the invoice on the platform (déposée/reçue/approuvée/refusée/encaissée).
    // Manual issuer-driven transitions for now; platform auto-feed comes in B6.
    rpc SetInvoiceLifecycleStatus(SetInvoiceLifecycleStatusRequest) returns (GenericResponse);
    rpc ListInvoiceLifecycleEvents(ListInvoiceLifecycleEventsRequest) returns (ListInvoiceLifecycleEventsResponse);

    // Deposit an issued invoice on the e-invoicing platform (B6). Drives the
    // DEPOSITED transition through the same lifecycle guards as the manual RPC.
    // No-op platform by default until a PA (Plateforme Agréée) is contracted.
    rpc DepositInvoice(DepositInvoiceRequest) returns (GenericResponse);

    // E-reporting (B5/C5): transmit a period aggregate of out-of-scope-of-
    // e-invoicing operations — domestic B2C (TRANSACTION) or intra-EU distance
    // sales (CROSS_BORDER_B2C). No-op platform by default until a PA is contracted.
    rpc SubmitInvoiceReport(SubmitInvoiceReportRequest) returns (GenericResponse);
    rpc ListInvoiceReports(ListInvoiceReportsRequest) returns (ListInvoiceReportsResponse);
}

message GenericResponse {
    bool  success = 1;
    int32 code    = 2;
}

message ValidationError {
    string field   = 1;
    string message = 2;
}

// ─── Create / Issue ──────────────────────────────────────────────────────────

message CreateInvoiceFromScheduleRequest {
    string user_id              = 1;
    string schedule_id          = 2;
    repeated int32 month_indexes = 3;
    string sale_date            = 4;  // YYYY-MM-DD, optional (defaults to issue date)
    int32  due_in_days          = 5;  // optional (defaults to 30)
    bool   issue_now            = 6;  // if true, issue immediately after creation
}

message CreateInvoiceFromQuoteRequest {
    string user_id     = 1;
    string quote_id    = 2;
    string sale_date   = 3;
    int32  due_in_days = 4;
    bool   issue_now   = 5;
}

message CreateInvoiceResponse {
    bool   success        = 1;
    int32  code           = 2;
    string invoice_id     = 3;
    string invoice_number = 4;  // populated only when issued
    repeated ValidationError validation_errors = 5;
}

message IssueInvoiceRequest {
    string invoice_id = 1;
    string user_id    = 2;
}

message MarkInvoicePaidRequest {
    string invoice_id = 1;
    string user_id    = 2;
}

message DeleteDraftInvoiceRequest {
    string invoice_id = 1;
    string user_id    = 2;
}

// ─── Read ────────────────────────────────────────────────────────────────────

message GetInvoiceRequest {
    string invoice_id = 1;
    string user_id    = 2;
}

message InvoiceParty {
    string company           = 1;
    string first_name        = 2;
    string last_name         = 3;
    string siren             = 4;
    string vat               = 5;
    string email             = 6;
    string phone             = 7;
    string logo_url          = 8;
    string street            = 9;
    string additional_street = 10;
    string zip_code          = 11;
    string city              = 12;
    // client_type is the frozen B2C/B2B nature of the client at issue time:
    // "individual" or "business" (empty for legacy snapshots). Only meaningful
    // on the client party, not the issuer.
    string client_type       = 13;
    // client_country_id is the client's frozen country id at issue time (0 for
    // legacy snapshots). Drives OSS destination-country VAT. Client side only.
    int32 client_country_id  = 14;
    // country_code is the party's frozen ISO 3166-1 alpha-2 country code at issue
    // time ('' for legacy). Carries the issuer code on the issuer party and the
    // client code on the client party; drives the Factur-X buyer/seller country.
    string country_code      = 15;
    // Issuer payment instructions (BG-16), frozen at issue time. Issuer side only.
    string iban              = 16;
    string bic               = 17;
    // siret is the party's frozen 14-digit establishment id (SIREN + NIC) at issue
    // time ('' for legacy). Recipient routing key for B2B e-invoicing; emitted as
    // the legal registration id (BT-30/BT-47, scheme 0009) in preference to SIREN.
    string siret             = 18;
}

message InvoiceLine {
    string quote_line_id   = 1;
    string name            = 2;
    string unit            = 3;
    string quantity        = 4;
    int64  unit_price_cents = 5;
    int64  line_ht_cents   = 6;
    int32  tax_id          = 7;
    string tax_rate        = 8;
    string tax_label       = 9;
}

message InvoiceVatLine {
    string tax_rate      = 1;
    int64  base_ht_cents = 2;
    int64  vat_cents     = 3;
}

message InvoiceDetails {
    string invoice_id            = 1;
    string user_id               = 2;
    string quote_id              = 3;
    string schedule_id           = 4;
    repeated int32 billed_month_indexes = 5;
    string status                = 6;
    string invoice_number        = 7;
    string issued_at             = 8;
    string sale_date             = 9;
    string due_date              = 10;
    InvoiceParty issuer          = 11;
    InvoiceParty client          = 12;
    repeated InvoiceLine lines   = 13;
    repeated InvoiceVatLine vat_breakdown = 14;
    int64  total_ht_cents        = 15;
    int64  total_vat_cents       = 16;
    int64  total_ttc_cents       = 17;
    bool   vat_exempt            = 18;
    // Line positions already credited by an existing credit note (ISSUED/PAID
    // invoices only). The UI greys these out in the credit-note dialog.
    repeated int32 credited_positions = 19;
    // oss_applied is the frozen OSS distance-selling flag: when true, every line
    // was taxed at the client's destination-country VAT rate (declared via the
    // EU One-Stop-Shop), which drives the OSS legal mention on the PDF.
    bool   oss_applied           = 20;
    // lifecycle_status is the e-invoicing platform status: "NONE" until a
    // lifecycle event is recorded, then DEPOSITED/RECEIVED/APPROVED/REJECTED/COLLECTED.
    string lifecycle_status      = 21;
}

message GetInvoiceResponse {
    bool           success = 1;
    int32          code    = 2;
    InvoiceDetails invoice = 3;
}

message InvoiceFilters {
    repeated string statuses           = 1;
    repeated string lifecycle_statuses = 2;
    string          issued_from        = 3;
    string          issued_to          = 4;
    string          due_from           = 5;
    string          due_to             = 6;
    string          client_id          = 7;
    string          quote_id_filter    = 8;
}

message ListInvoicesRequest {
    string         user_id        = 1;
    string         quote_id       = 2;  // optional filter (legacy, kept for embedded use)
    int32          page           = 3;
    int32          page_size      = 4;
    InvoiceFilters filters        = 5;
    string         sort_by        = 6;
    string         sort_direction = 7;
}

message InvoiceSummary {
    string invoice_id      = 1;
    string invoice_number  = 2;
    string status          = 3;
    string quote_id        = 4;
    string schedule_id     = 5;
    string issued_at       = 6;
    string due_date        = 7;
    int64  total_ttc_cents = 8;
    string lifecycle_status = 9;  // "NONE" until a lifecycle event is recorded
}

message ListInvoicesResponse {
    bool                    success  = 1;
    int32                   code     = 2;
    repeated InvoiceSummary invoices = 3;
    int64                   total    = 4;
}

// ─── Credit notes (avoirs) ───────────────────────────────────────────────────

message CreateCreditNoteRequest {
    string user_id    = 1;
    string invoice_id = 2;
    repeated int32 positions = 3;  // invoice_line_snapshots positions; empty = total of the remainder
    string reason     = 4;         // optional
}

message CreateCreditNoteResponse {
    bool   success            = 1;
    int32  code               = 2;
    string credit_note_id     = 3;
    string credit_note_number = 4;
    repeated ValidationError validation_errors = 5;
}

message GetCreditNoteRequest {
    string credit_note_id = 1;
    string user_id        = 2;
}

message CreditNoteDetails {
    string credit_note_id     = 1;
    string user_id            = 2;
    string invoice_id         = 3;
    string invoice_number     = 4;   // origin invoice number (legal reference)
    string credit_note_number = 5;
    string issued_at          = 6;
    string reason             = 7;
    bool   is_total           = 8;
    InvoiceParty issuer       = 9;
    InvoiceParty client       = 10;
    repeated InvoiceLine lines = 11;  // amounts positive; negated at render
    repeated InvoiceVatLine vat_breakdown = 12;
    int64  total_ht_cents     = 13;
    int64  total_vat_cents    = 14;
    int64  total_ttc_cents    = 15;
    bool   vat_exempt         = 16;
    // oss_applied is inherited from the origin invoice: drives the OSS legal
    // mention on the credit-note PDF.
    bool   oss_applied        = 17;
}

message GetCreditNoteResponse {
    bool              success     = 1;
    int32             code        = 2;
    CreditNoteDetails credit_note = 3;
}

message CreditNoteFilters {
    string is_total   = 1;  // "true", "false", or "" (all)
    string issued_from = 2;
    string issued_to   = 3;
}

message ListCreditNotesRequest {
    string            user_id        = 1;
    string            invoice_id     = 2;  // optional filter (legacy)
    int32             page           = 3;
    int32             page_size      = 4;
    CreditNoteFilters filters        = 5;
    string            sort_by        = 6;
    string            sort_direction = 7;
}

message CreditNoteSummary {
    string credit_note_id     = 1;
    string credit_note_number = 2;
    string invoice_id         = 3;
    string invoice_number     = 4;
    string issued_at          = 5;
    bool   is_total           = 6;
    int64  total_ttc_cents    = 7;
}

message ListCreditNotesResponse {
    bool                       success      = 1;
    int32                      code         = 2;
    repeated CreditNoteSummary credit_notes = 3;
    int64                      total        = 4;
}

// ─── Inalterability ──────────────────────────────────────────────────────────

message VerifyChainRequest {
    string user_id = 1;
}

message VerifyChainResponse {
    bool   success         = 1;
    int32  code            = 2;
    bool   ok              = 3;  // chain intact
    int64  checked         = 4;  // number of links verified
    string broken_doc_id   = 5;  // first broken link (empty if ok)
    string broken_doc_type = 6;
    int64  broken_index    = 7;
    string reason          = 8;
}

// ─── OSS threshold status ────────────────────────────────────────────────────

message GetOSSThresholdStatusRequest {
    string user_id = 1;
}

message GetOSSThresholdStatusResponse {
    bool   success           = 1;
    int32  code              = 2;
    int32  year              = 3;  // civil year (Europe/Paris) the figures cover
    int64  cumulative_ht_cents = 4; // net distance-sale B2C intra-EU turnover YTD
    int64  threshold_cents   = 5;  // EUR 10 000 legal threshold, in cents
    bool   oss_enabled       = 6;  // issuer opted in (anticipation)
    bool   oss_active        = 7;  // OSS currently applies (opted in OR threshold reached OR N-1 rule)
    // N-1 rule (art. 259 D CGI): prior civil year crossed the threshold, so
    // destination VAT applies from the first euro this year.
    bool   prior_year_over_threshold      = 8;
    int64  prior_year_cumulative_ht_cents = 9;
}

// ─── E-invoicing lifecycle ───────────────────────────────────────────────────

message SetInvoiceLifecycleStatusRequest {
    string invoice_id = 1;
    string user_id    = 2;
    string status     = 3;  // DEPOSITED | RECEIVED | APPROVED | REJECTED | COLLECTED
    string note       = 4;  // optional
}

message InvoiceLifecycleEvent {
    string status     = 1;
    string note       = 2;
    string created_at = 3;  // RFC3339
}

message ListInvoiceLifecycleEventsRequest {
    string invoice_id = 1;
    string user_id    = 2;
}

message DepositInvoiceRequest {
    string invoice_id = 1;
    string user_id    = 2;
    string note       = 3;  // optional, appended to the DEPOSITED lifecycle event
}

message ListInvoiceLifecycleEventsResponse {
    bool                           success = 1;
    int32                          code    = 2;
    repeated InvoiceLifecycleEvent events  = 3;
}

// ─── E-reporting (B5/C5) ─────────────────────────────────────────────────────

message SubmitInvoiceReportRequest {
    string user_id = 1;
    string kind    = 2;  // TRANSACTION | CROSS_BORDER_B2C
    int32  year    = 3;  // civil year (Europe/Paris)
    int32  month   = 4;  // 1-12
}

message ListInvoiceReportsRequest {
    string user_id = 1;
    string kind    = 2;  // optional filter (TRANSACTION | CROSS_BORDER_B2C)
}

message InvoiceReportSummary {
    string kind            = 1;
    int32  year            = 2;
    int32  month           = 3;
    string status          = 4;  // NONE | DEPOSITED | RECEIVED | APPROVED | REJECTED | COLLECTED
    int64  total_ht_cents  = 5;
    int64  total_vat_cents = 6;
    string submitted_at    = 7;  // RFC3339
}

message ListInvoiceReportsResponse {
    bool                          success = 1;
    int32                         code    = 2;
    repeated InvoiceReportSummary reports = 3;
}
