syntax = "proto3";

// Package matches the users service so the wire format aligns:
// /users.UserService/CreateUser and /users.UserService/DeleteUser
package users;

option go_package = "project-devis-auth/services/user_auth";

// UserService is the subset of the users service API that the auth service needs.
service UserService {
    // CreateUser adds a new user to the users service.
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    // DeleteUser removes a user from the users service (used for rollback on failed registration).
    rpc DeleteUser(DeleteUserRequest) returns (GenericResponse);
    // Resolve a user account by email for authentication flows.
    rpc GetUserAccessInfoByEmail(GetUserAccessInfoByEmailRequest) returns (GetUserAccessInfoResponse);
    // GetUserSecurityStatus checks account suspension state.
    rpc GetUserAccessInfo(GetUserAccessInfoRequest) returns (GetUserAccessInfoResponse);
    // TouchUserLastLogin stores the timestamp of the latest successful login.
    rpc TouchUserLastLogin(TouchUserLastLoginRequest) returns (GenericResponse);
    // LinkClientUser links an auth user account to a client record.
    rpc LinkClientUser(LinkClientUserRequest) returns (GenericResponse);
    // GetClientsByLinkedUser returns all clients linked to a given auth user (one per provider).
    rpc GetClientsByLinkedUser(GetClientByLinkedUserRequest) returns (GetClientsResponse);
}

message CreateUserRequest {
    string email = 1;
    bool is_admin = 2;
}

message CreateUserResponse {
    bool success = 1;
    int32 code = 2;
    string user_id = 3;
}

message DeleteUserRequest {
    string user_id = 1;
}

message GetUserAccessInfoRequest {
    string user_id = 1;
}

message GetUserAccessInfoByEmailRequest {
    string email = 1;
}

message GetUserAccessInfoResponse {
    bool success = 1;
    int32 code = 2;
    string user_id = 3;
    string email = 4;
    string role = 5;
    bool suspended = 6;
}

message TouchUserLastLoginRequest {
    string user_id = 1;
}

message GenericResponse {
    bool success = 1;
    int32 code = 2;
}

message LinkClientUserRequest {
    string client_id      = 1;
    string provider_id    = 2;
    string linked_user_id = 3;
}

message GetClientByLinkedUserRequest {
    string linked_user_id = 1;
}

message ClientStub {
    string client_id      = 1;
    string user_id        = 2;
    string first_name     = 3;
    string last_name      = 4;
    string email          = 5;
    string phone          = 6;
    string company        = 7;
    string siren          = 8;
    string vat            = 9;
    bool   archived       = 10;
    int32  client_type    = 11;
    string siret          = 12;
    string linked_user_id = 13;
}

message GetClientResponse {
    bool        success = 1;
    int32       code    = 2;
    ClientStub  client  = 3;
}

message GetClientsResponse {
    bool              success = 1;
    int32             code    = 2;
    repeated ClientStub clients = 3;
}
