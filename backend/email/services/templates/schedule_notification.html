<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Mise à jour de votre échéancier</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
      <td align="center" style="padding:48px 16px;">

        <!-- Card -->
        <table width="560" cellpadding="0" cellspacing="0" role="presentation" style="max-width:560px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);">

          <!-- Header -->
          <tr>
            <td style="background:#1e293b;padding:28px 40px;">
              <span style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.3px;">Devis</span>
            </td>
          </tr>

          <!-- Status banner -->
          <tr>
            <td style="background:{{.StatusBg}};padding:14px 40px;">
              <p style="margin:0;font-size:14px;font-weight:600;color:{{.StatusColor}};">
                {{.StatusIcon}} Échéancier {{.StatusLabel}}
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 40px 36px;">
              <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#0f172a;line-height:1.3;">
                Bonjour{{if .ClientName}} {{.ClientName}}{{end}},
              </h1>
              <p style="margin:0 0 28px;font-size:15px;color:#475569;line-height:1.6;">
                {{.Message}}
              </p>

              <!-- Info box -->
              <table width="100%" cellpadding="0" cellspacing="0" role="presentation"
                     style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;">
                <tr>
                  <td style="padding:20px 24px;">
                    <p style="margin:0 0 4px;font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;">Devis concerné</p>
                    <p style="margin:0;font-size:17px;font-weight:700;color:#0f172a;">{{.QuoteName}}</p>
                  </td>
                </tr>
              </table>

              <p style="margin:32px 0 0;font-size:14px;color:#475569;line-height:1.6;">
                Cordialement
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f8fafc;padding:20px 40px;border-top:1px solid #e2e8f0;">
              <p style="margin:0;font-size:12px;color:#94a3b8;text-align:center;line-height:1.6;">
                © Devis — Gestion de devis simplifiée
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
