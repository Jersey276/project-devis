syntax = "proto3";

package users;

option go_package = "project-devis-users/services/grpc";

service UserService {
    // User
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
    rpc DeleteUser(DeleteUserRequest) returns (GenericResponse);

    // Client
    rpc CreateClient(CreateClientRequest) returns (CreateClientResponse);
    rpc GetClient(GetClientRequest) returns (GetClientResponse);
    rpc ListClients(ListClientsRequest) returns (ListClientsResponse);
    rpc UpdateClient(UpdateClientRequest) returns (UpdateClientResponse);
    rpc ArchiveClient(ArchiveClientRequest) returns (GenericResponse);

    // Address
    rpc CreateAddress(CreateAddressRequest) returns (CreateAddressResponse);
    rpc GetAddress(GetAddressRequest) returns (GetAddressResponse);
    rpc ListAddresses(ListAddressesRequest) returns (ListAddressesResponse);
    rpc UpdateAddress(UpdateAddressRequest) returns (UpdateAddressResponse);
    rpc ArchiveAddress(ArchiveAddressRequest) returns (GenericResponse);

    // Country
    rpc CreateCountry(CreateCountryRequest) returns (CreateCountryResponse);
    rpc GetCountry(GetCountryRequest) returns (GetCountryResponse);
    rpc ListCountries(ListCountriesRequest) returns (ListCountriesResponse);
    rpc UpdateCountry(UpdateCountryRequest) returns (UpdateCountryResponse);
    rpc DeleteCountry(DeleteCountryRequest) returns (GenericResponse);

    // CountryGroup
    rpc CreateCountryGroup(CreateCountryGroupRequest) returns (CreateCountryGroupResponse);
    rpc GetCountryGroup(GetCountryGroupRequest) returns (GetCountryGroupResponse);
    rpc ListCountryGroups(ListCountryGroupsRequest) returns (ListCountryGroupsResponse);
    rpc UpdateCountryGroup(UpdateCountryGroupRequest) returns (UpdateCountryGroupResponse);
    rpc DeleteCountryGroup(DeleteCountryGroupRequest) returns (GenericResponse);
    rpc AttachCountry(AttachCountryRequest) returns (GenericResponse);
    rpc DetachCountry(DetachCountryRequest) returns (GenericResponse);

    // Tax
    rpc CreateTax(CreateTaxRequest) returns (CreateTaxResponse);
    rpc GetTax(GetTaxRequest) returns (GetTaxResponse);
    rpc ListTaxes(ListTaxesRequest) returns (ListTaxesResponse);
    rpc ListTaxesForUser(ListTaxesForUserRequest) returns (ListTaxesResponse);
    rpc UpdateTax(UpdateTaxRequest) returns (UpdateTaxResponse);
    rpc DeleteTax(DeleteTaxRequest) returns (GenericResponse);
}

message GenericResponse {
    bool success = 1;
    int32 code = 2;
}

// ─── User ────────────────────────────────────────────────────────────────────

message User {
    string user_id = 1;
    string email = 2;
    string phone = 3;
    string company = 4;
    string siren = 5;
    string vat = 6;
    string logo_url = 7;
}

// CreateUser only requires email — user_id is generated by the users service.
// Optional fields (phone, company, siren, vat) are set later via UpdateUser.
message CreateUserRequest {
    string email = 1;
}

message CreateUserResponse {
    bool success = 1;
    int32 code = 2;
    string user_id = 3;
}

message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    bool success = 1;
    int32 code = 2;
    User user = 3;
}

// All fields except user_id are optional.
message UpdateUserRequest {
    string user_id = 1;
    string phone = 2;
    string company = 3;
    string siren = 4;
    string vat = 5;
    string logo_url = 6;
}

message UpdateUserResponse {
    bool success = 1;
    int32 code = 2;
}

message DeleteUserRequest {
    string user_id = 1;
}

// ─── Client ──────────────────────────────────────────────────────────────────

message Client {
    string client_id = 1;
    string user_id = 2;
    string first_name = 3;
    string last_name = 4;
    string email = 5;
    string phone = 6;
    string company = 7;
    string siren = 8;
    string vat = 9;
    bool archived = 10;
}

message CreateClientRequest {
    string user_id = 1;
    string first_name = 2;
    string last_name = 3;
    string email = 4;
    string phone = 5;
    string company = 6;
    string siren = 7;
    string vat = 8;
}

message CreateClientResponse {
    bool success = 1;
    int32 code = 2;
    string client_id = 3;
}

message GetClientRequest {
    string client_id = 1;
    string user_id = 2;
}

message GetClientResponse {
    bool success = 1;
    int32 code = 2;
    Client client = 3;
}

message ListClientsRequest {
    string user_id = 1;
    bool include_archived = 2;
}

message ListClientsResponse {
    bool success = 1;
    int32 code = 2;
    repeated Client clients = 3;
}

message UpdateClientRequest {
    string client_id = 1;
    string user_id = 2;
    string first_name = 3;
    string last_name = 4;
    string email = 5;
    string phone = 6;
    string company = 7;
    string siren = 8;
    string vat = 9;
}

message UpdateClientResponse {
    bool success = 1;
    int32 code = 2;
}

message ArchiveClientRequest {
    string client_id = 1;
    string user_id = 2;
}

// ─── Address ─────────────────────────────────────────────────────────────────

// OwnerType discriminates address ownership. Wire string equivalents are
// "user" / "client" — see sqlutil.OwnerTypeToDBString.
enum OwnerType {
    OWNER_TYPE_UNSPECIFIED = 0;
    OWNER_TYPE_USER        = 1;
    OWNER_TYPE_CLIENT      = 2;
}

message Address {
    int32 id = 1;
    OwnerType owner_type = 2;
    string owner_id = 3;
    string name = 4;
    string street = 5;
    string additional_street = 6;
    string city = 7;
    string zip_code = 8;
    int32 country_id = 9;
    string email = 10;
    string phone = 11;
    bool archived = 12;
}

message CreateAddressRequest {
    OwnerType owner_type = 1;
    string owner_id = 2;
    string name = 3;
    string street = 4;
    string additional_street = 5;
    string city = 6;
    string zip_code = 7;
    int32 country_id = 8;
    string email = 9;
    string phone = 10;
    // Authenticated user; the action validates that (owner_type, owner_id)
    // is reachable from this user (user-owned: equal; client-owned: belongs).
    string auth_user_id = 11;
}

message CreateAddressResponse {
    bool success = 1;
    int32 code = 2;
    int32 address_id = 3;
}

message GetAddressRequest {
    int32 address_id = 1;
    OwnerType owner_type = 2;
    string owner_id = 3;
    string auth_user_id = 4;
}

message GetAddressResponse {
    bool success = 1;
    int32 code = 2;
    Address address = 3;
}

message ListAddressesRequest {
    OwnerType owner_type = 1;
    string owner_id = 2;
    string auth_user_id = 3;
}

message ListAddressesResponse {
    bool success = 1;
    int32 code = 2;
    repeated Address addresses = 3;
}

message UpdateAddressRequest {
    int32 address_id = 1;
    OwnerType owner_type = 2;
    string owner_id = 3;
    string name = 4;
    string street = 5;
    string additional_street = 6;
    string city = 7;
    string zip_code = 8;
    int32 country_id = 9;
    string email = 10;
    string phone = 11;
    string auth_user_id = 12;
}

message UpdateAddressResponse {
    bool success = 1;
    int32 code = 2;
}

message ArchiveAddressRequest {
    int32 address_id = 1;
    OwnerType owner_type = 2;
    string owner_id = 3;
    string auth_user_id = 4;
}

// ─── Country ──────────────────────────────────────────────────────────────────

message Country {
    int32 id = 1;
    string code = 2;
    string name = 3;
}

message CreateCountryRequest {
    string code = 1;
    string name = 2;
}

message CreateCountryResponse {
    bool success = 1;
    int32 code = 2;
    int32 country_id = 3;
}

message GetCountryRequest {
    int32 country_id = 1;
}

message GetCountryResponse {
    bool success = 1;
    int32 code = 2;
    Country country = 3;
}

message ListCountriesRequest {}

message ListCountriesResponse {
    bool success = 1;
    int32 code = 2;
    repeated Country countries = 3;
}

message UpdateCountryRequest {
    int32 country_id = 1;
    string code = 2;
    string name = 3;
}

message UpdateCountryResponse {
    bool success = 1;
    int32 code = 2;
}

message DeleteCountryRequest {
    int32 country_id = 1;
}

// ─── CountryGroup ─────────────────────────────────────────────────────────────

message CountryGroup {
    int32 id = 1;
    string name = 2;
    repeated Country countries = 3;
    repeated Tax taxes = 4;
}

message CreateCountryGroupRequest {
    string name = 1;
}

message CreateCountryGroupResponse {
    bool success = 1;
    int32 code = 2;
    int32 country_group_id = 3;
}

message GetCountryGroupRequest {
    int32 country_group_id = 1;
}

message GetCountryGroupResponse {
    bool success = 1;
    int32 code = 2;
    CountryGroup country_group = 3;
}

message ListCountryGroupsRequest {}

message ListCountryGroupsResponse {
    bool success = 1;
    int32 code = 2;
    repeated CountryGroup country_groups = 3;
}

message UpdateCountryGroupRequest {
    int32 country_group_id = 1;
    string name = 2;
}

message UpdateCountryGroupResponse {
    bool success = 1;
    int32 code = 2;
}

message DeleteCountryGroupRequest {
    int32 country_group_id = 1;
}

message AttachCountryRequest {
    int32 country_group_id = 1;
    int32 country_id = 2;
}

message DetachCountryRequest {
    int32 country_group_id = 1;
    int32 country_id = 2;
}

// ─── Tax ─────────────────────────────────────────────────────────────────────

message Tax {
    int32 id = 1;
    string name = 2;
    string rate = 3;
    int32 country_group_id = 4;
    bool is_default = 5;
    int32 original_tax_id = 6; // 0 if this row is the original
    int32 version = 7;
    string superseded_at = 8; // ISO8601, "" if current
    int32 superseded_by = 9; // 0 if not replaced
}

message CreateTaxRequest {
    string name = 1;
    string rate = 2;
    int32 country_group_id = 3;
    bool is_default = 4;
}

message CreateTaxResponse {
    bool success = 1;
    int32 code = 2;
    int32 tax_id = 3;
}

message GetTaxRequest {
    int32 tax_id = 1;
}

message GetTaxResponse {
    bool success = 1;
    int32 code = 2;
    Tax tax = 3;
}

message ListTaxesRequest {
    int32 country_group_id = 1;
}

message ListTaxesForUserRequest {
    string user_id = 1;
    repeated int32 include_ids = 2;
    // When non-zero, resolves the country group from this user-owned address
    // instead of the user's first address (MIN(id)).
    int32 address_id = 3;
}

message ListTaxesResponse {
    bool success = 1;
    int32 code = 2;
    repeated Tax taxes = 3;
}

message UpdateTaxRequest {
    int32 tax_id = 1;
    string name = 2;
    string rate = 3;
    bool is_default = 4;
}

message UpdateTaxResponse {
    bool success = 1;
    int32 code = 2;
    int32 tax_id = 3; // id of the current version after update (may be a new row)
}

message DeleteTaxRequest {
    int32 tax_id = 1;
}
