syntax = "proto3";

package project;

option go_package = "gateway/project";

service ProjectService {
    rpc CreateProject           (CreateProjectRequest)          returns (CreateProjectResponse);
    rpc GetProject              (GetProjectRequest)             returns (GetProjectResponse);
    rpc ListProjects            (ListProjectsRequest)           returns (ListProjectsResponse);
    rpc UpdateProject           (UpdateProjectRequest)          returns (GenericResponse);
    rpc DeleteProject           (DeleteProjectRequest)          returns (GenericResponse);
    rpc AddQuoteToProject       (AddQuoteToProjectRequest)      returns (GenericResponse);
    rpc RemoveQuoteFromProject  (RemoveQuoteFromProjectRequest) returns (GenericResponse);
    rpc ListProjectQuoteIds     (ListProjectQuoteIdsRequest)    returns (ListProjectQuoteIdsResponse);
}

message GenericResponse {
    bool  success = 1;
    int32 code    = 2;
}

message ValidationError {
    string field   = 1;
    string message = 2;
}

message Project {
    string project_id  = 1;
    string user_id     = 2;
    string name        = 3;
    string client_id   = 4;
    string status      = 5;
    string created_at  = 6;
    string updated_at  = 7;
    int32  quote_count = 8;
}

message CreateProjectRequest {
    string user_id   = 1;
    string name      = 2;
    string client_id = 3;
}

message CreateProjectResponse {
    bool   success    = 1;
    int32  code       = 2;
    string project_id = 3;
    repeated ValidationError validation_errors = 4;
}

message GetProjectRequest {
    string project_id = 1;
    string user_id    = 2;
}

message GetProjectResponse {
    bool    success = 1;
    int32   code    = 2;
    Project project = 3;
}

message ListProjectsRequest {
    string user_id        = 1;
    int32  page           = 2;
    int32  page_size      = 3;
    string search         = 4;
    string status         = 5;
    string client_id      = 6;
    string sort_by        = 7;
    string sort_direction = 8;
}

message ListProjectsResponse {
    bool             success  = 1;
    int32            code     = 2;
    repeated Project projects = 3;
    int64            total    = 4;
}

message UpdateProjectRequest {
    string project_id = 1;
    string user_id    = 2;
    string name       = 3;
    string client_id  = 4;
    string status     = 5;
}

message DeleteProjectRequest {
    string project_id = 1;
    string user_id    = 2;
}

message AddQuoteToProjectRequest {
    string project_id = 1;
    string user_id    = 2;
    string quote_id   = 3;
}

message RemoveQuoteFromProjectRequest {
    string project_id = 1;
    string user_id    = 2;
    string quote_id   = 3;
}

message ListProjectQuoteIdsRequest {
    string project_id = 1;
    string user_id    = 2;
}

message ListProjectQuoteIdsResponse {
    bool            success   = 1;
    int32           code      = 2;
    repeated string quote_ids = 3;
}
