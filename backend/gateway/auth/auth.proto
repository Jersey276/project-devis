syntax = "proto3";

package auth;

option go_package = "gateway/auth";

service AuthService {
    rpc Register(RegisterRequest) returns (FormGenericResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc ResetPassword(ResetPasswordRequest) returns (GenericResponse);
    rpc ConfirmResetPassword(ConfirmResetPasswordRequest) returns (GenericResponse);
    rpc UpdatePassword(UpdatePasswordRequest) returns (GenericResponse);
    rpc VerifyEmail(VerifyEmailRequest) returns (GenericResponse);
    rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse);
    rpc Logout(LogoutRequest) returns (GenericResponse);
    rpc IntrospectToken(IntrospectTokenRequest) returns (IntrospectTokenResponse);
    rpc UpdateSubscriptionTier(UpdateSubscriptionTierRequest) returns (GenericResponse);
    rpc ResendEmailVerification(ResendEmailVerificationRequest) returns (GenericResponse);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
    bool remember_me = 3;
}

message LoginResponse {
    bool success = 1;
    optional string token = 2;
    optional int32 code = 3;
    optional string refresh_token = 4;
    optional bool remember_me = 5;
}

message UpdatePasswordRequest {
    string email = 1;
    string old_password = 2;
    string new_password = 3;
    string current_refresh_token = 4;
}

message GenericResponse {
    bool success = 1;
    int32 code = 2;
}

message ResetPasswordRequest {
    string email = 1;
}

message ConfirmResetPasswordRequest {
    string token = 1;
    string new_password = 2;
}

message VerifyEmailRequest {
    string email = 1;
    string token = 2;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message LogoutRequest {
    string refresh_token = 1;
}

message FormGenericResponse {
    bool success = 1;
    int32 code = 2;
    repeated FormFieldError field_errors = 3;
}

message FormFieldError {
    string field = 1;
    repeated int32 error_code = 2;
}

message IntrospectTokenRequest {
    string token = 1;
}

message AccessContext {
    string user_id = 1;
    string email = 2;
    string role = 3;
    string account_status = 4;
    string subscription_tier = 5;
    int32 session_version = 6;
}

message IntrospectTokenResponse {
    bool success = 1;
    int32 code = 2;
    AccessContext context = 3;
}

message UpdateSubscriptionTierRequest {
    string user_id = 1;
    string tier    = 2;
}

message ResendEmailVerificationRequest {
    string user_id = 1;
}