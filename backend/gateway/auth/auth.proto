syntax = "proto3";

option go_package = "project-devis-gateway/auth";

// AuthService provides authentication operations
service AuthService {
    // Register creates a new user account
    rpc Register(RegisterRequest) returns (RegisterResponse);
    // Login authenticates a user and returns credentials
    rpc Login(LoginRequest) returns (LoginResponse);
    // ResetPassword initiates a password reset process
    rpc ResetPassword(ResetPasswordRequest) returns (GenericResponse);
    // UpdatePassword changes a user's password
    rpc UpdatePassword(UpdatePasswordRequest) returns (GenericResponse);
    // VerifyEmail confirms a user's email address
    rpc VerifyEmail(VerifyEmailRequest) returns (GenericResponse);
}

// RegisterRequest contains user registration information
message RegisterRequest {
    string name = 1;
    string email = 2;
    string password = 3;
}

// RegisterResponse returns the result of registration
message RegisterResponse {
    bool success = 1;
}

// LoginRequest contains user login credentials
message LoginRequest {
    string email = 1;
    string password = 2;
    bool remember_me = 3;
}

// LoginResponse returns authentication tokens
message LoginResponse {
    bool success = 1;
    string token = 2;
}

message UpdatePasswordRequest {
    string email = 1;
    string old_password = 2;
    string new_password = 3;
}

message GenericResponse {
    bool success = 1;
    string message = 2;
}

message ResetPasswordRequest {
    string email = 1;
}

message VerifyEmailRequest {
    string email = 1;
    string token = 2;
}