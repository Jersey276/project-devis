syntax = "proto3";

package export;

option go_package = "gateway/export";

service ExportService {
    rpc ExportQuote(ExportQuoteRequest) returns (ExportQuoteResponse);
    rpc ExportSchedule(ExportScheduleRequest) returns (ExportQuoteResponse);
    rpc ExportInvoice(ExportInvoiceRequest) returns (ExportQuoteResponse);
}

message ExportQuoteRequest {
    string quote_id = 1;
    string user_id  = 2;
}

message ExportQuoteResponse {
    bool   success  = 1;
    int32  code     = 2;
    bytes  pdf      = 3;
    string filename = 4;
}

message ExportScheduleRequest {
    string schedule_id = 1;
    string user_id     = 2;
}

message ExportInvoiceRequest {
    string invoice_id = 1;
    string user_id    = 2;
}
