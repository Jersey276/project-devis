x-service-build: &service-build
  context: .
  dockerfile: Dockerfile

x-service-defaults: &service-defaults
  restart: unless-stopped

x-db-env: &db-env
  TZ: Europe/Paris
  DB_HOST: postgres
  DB_PORT: 5432
  DB_PASSWORD_FILE: /run/secrets/db_password

x-db-service: &db-service
  <<: *service-defaults
  depends_on:
    postgres:
      condition: service_healthy
  secrets:
    - db_password

services:
  devis-gateway:
    <<: *service-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: gateway
    environment:
      TZ: Europe/Paris
      AUTH_SERVICE_ADDRESS: devis-auth:50051
      USER_SERVICE_ADDRESS: devis-user:50052
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      EXPORT_SERVICE_ADDRESS: devis-export:50054
    ports:
      - "8080:8080"
    depends_on:
      - devis-auth
      - devis-user
      - devis-quote
      - devis-export

  devis-auth:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: auth
    environment:
      <<: *db-env
      DB_USER: devis-auth
      DB_NAME: auth
      USER_SERVICE_ADDRESS: devis-user:50052

  devis-user:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: users
    environment:
      <<: *db-env
      DB_USER: devis-users
      DB_NAME: users

  devis-quote:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: quote
    environment:
      <<: *db-env
      DB_USER: devis-quote
      DB_NAME: quote

  devis-export:
    <<: *service-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: export
    environment:
      TZ: Europe/Paris
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      USER_SERVICE_ADDRESS: devis-user:50052
      GOTENBERG_ADDRESS: http://gotenberg:3000
    depends_on:
      - devis-quote
      - devis-user
      - gotenberg

  gotenberg:
    <<: *service-defaults
    image: gotenberg/gotenberg:8
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=30s"

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devis-auth
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: auth
      TZ: Europe/Paris
    volumes:
      - postgres:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devis-auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

secrets:
  db_password:
    file: secrets/postgres_pswd.txt

volumes:
  postgres:
