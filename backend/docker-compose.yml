x-service-build: &service-build
  context: .
  dockerfile: Dockerfile

x-postgres-build: &postgres-build
  context: .
  dockerfile: Dockerfile.postgres

x-service-defaults: &service-defaults
  restart: unless-stopped

x-db-env: &db-env
  TZ: Europe/Paris
  DB_HOST: postgres
  DB_PORT: 5432
  DB_PASSWORD_FILE: /run/secrets/db_password

x-db-service: &db-service
  <<: *service-defaults
  depends_on:
    postgres-init:
      condition: service_completed_successfully
  secrets:
    - db_password

services:
  devis-gateway:
    <<: *service-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: gateway
    environment:
      TZ: Europe/Paris
      AUTH_SERVICE_ADDRESS: devis-auth:50051
      USER_SERVICE_ADDRESS: devis-user:50052
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      EXPORT_SERVICE_ADDRESS: devis-export:50054
      TEMPLATE_SERVICE_ADDRESS: devis-template:50055
      SCHEDULE_SERVICE_ADDRESS: devis-schedule:50056
    ports:
      - "8080:8080"
    depends_on:
      - devis-auth
      - devis-user
      - devis-quote
      - devis-export
      - devis-template
      - devis-schedule

  devis-auth:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: auth
    environment:
      <<: *db-env
      DB_USER: devis-auth
      DB_NAME: auth
      USER_SERVICE_ADDRESS: devis-user:50052
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: no-reply@project-devis.local
      RESET_PASSWORD_BASE_URL: http://localhost:3000/reset-password
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      devis-user:
        condition: service_started
      mailpit:
        condition: service_started

  devis-user:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: users
    environment:
      <<: *db-env
      DB_USER: devis-users
      DB_NAME: users

  devis-quote:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: quote
    environment:
      <<: *db-env
      DB_USER: devis-quote
      DB_NAME: quote

  devis-schedule:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: schedule
    environment:
      <<: *db-env
      DB_USER: devis-schedule
      DB_NAME: schedule
      QUOTE_SERVICE_ADDRESS: devis-quote:50053

  devis-template:
    <<: *db-service
    build:
      <<: *service-build
      args:
        SERVICE_NAME: template
    environment:
      <<: *db-env
      DB_USER: devis-template
      DB_NAME: template

  devis-export:
    <<: *service-defaults
    build:
      <<: *service-build
      args:
        SERVICE_NAME: export
    environment:
      TZ: Europe/Paris
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      USER_SERVICE_ADDRESS: devis-user:50052
      GOTENBERG_ADDRESS: http://gotenberg:3000
    depends_on:
      - devis-quote
      - devis-user
      - gotenberg

  gotenberg:
    <<: *service-defaults
    image: gotenberg/gotenberg:8
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=30s"
      # SSRF mitigation. Blocks user-supplied URLs (logo_url) from reaching:
      #   IPv4: localhost, 0.0.0.0, 127/8, 10/8, 192.168/16, 169.254/16
      #         (cloud metadata incl. 169.254.169.254), 172.16-31/12
      #   IPv6: [::1] loopback, [fc..|fd..] ULA (fc00::/7), [fe8.|fe9.|fea.|feb.]
      #         link-local (fe80::/10).
      # Chromium canonicalizes IPv6 to the short form before matching, so these
      # bracketed patterns also cover the equivalent expanded representations.
      - "--chromium-deny-list=^https?://(localhost|0\\.0\\.0\\.0|127\\.|10\\.|192\\.168\\.|169\\.254\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.|\\[::1\\]|\\[[fF][cdCD]|\\[[fF][eE][89aAbB])"

  mailpit:
    <<: *service-defaults
    image: axllent/mailpit:v1.27
    ports:
      - "8025:8025"
      - "1025:1025"

  postgres:
    build: *postgres-build
    restart: unless-stopped
    environment:
      POSTGRES_USER: devis-auth
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: auth
      TZ: Europe/Paris
    volumes:
      - postgres:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devis-auth -d auth"]
      interval: 1s
      timeout: 5s
      retries: 30

  # Idempotent DB/role provisioning. Runs on every `compose up` against the
  # live cluster, so adding a new database no longer requires wiping the volume.
  postgres-init:
    build: *postgres-build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      POSTGRES_USER: devis-auth
    secrets:
      - db_password
    entrypoint: ["/docker-entrypoint-initdb.d/init.sh"]
    restart: "no"

secrets:
  db_password:
    file: secrets/postgres_pswd.txt

volumes:
  postgres:
