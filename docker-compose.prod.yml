x-service-defaults: &service-defaults
  restart: unless-stopped
  pull_policy: always

x-common-env: &common-env
  TZ: Europe/Paris

x-db-common-env: &db-common-env
  <<: *common-env
  DB_PORT: 5432

services:
  front:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/front:${IMAGE_TAG:-latest}
    environment:
      <<: *common-env
      APP_ENV: production
    ports:
      - "${FRONT_PORT:-3001}:3000"
    depends_on:
      - devis-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  devis-gateway:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/gateway:${IMAGE_TAG:-latest}
    environment:
      <<: *common-env
      AUTH_SERVICE_ADDRESS: devis-auth:50051
      USER_SERVICE_ADDRESS: devis-user:50052
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      EXPORT_SERVICE_ADDRESS: devis-export:50054
    ports:
      - "8080:8080"
    depends_on:
      - devis-auth
      - devis-user
      - devis-quote
      - devis-export

  devis-auth:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/auth:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_HOST: ${AUTH_DB_HOST}
      DB_PORT: ${AUTH_DB_PORT:-5432}
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_NAME: ${AUTH_DB_NAME:-auth}
      USER_SERVICE_ADDRESS: devis-user:50052

  devis-user:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/users:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_HOST: ${USER_DB_HOST}
      DB_PORT: ${USER_DB_PORT:-5432}
      DB_USER: ${USER_DB_USER}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      DB_NAME: ${USER_DB_NAME:-users}

  devis-quote:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/quote:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_HOST: ${QUOTE_DB_HOST}
      DB_PORT: ${QUOTE_DB_PORT:-5432}
      DB_USER: ${QUOTE_DB_USER}
      DB_PASSWORD: ${QUOTE_DB_PASSWORD}
      DB_NAME: ${QUOTE_DB_NAME:-quote}

  devis-export:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/export:${IMAGE_TAG:-latest}
    environment:
      <<: *common-env
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      USER_SERVICE_ADDRESS: devis-user:50052
      GOTENBERG_ADDRESS: http://gotenberg:3000
    depends_on:
      - devis-quote
      - devis-user
      - gotenberg

  gotenberg:
    <<: *service-defaults
    image: gotenberg/gotenberg:8
    pull_policy: missing
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=30s"
      - "--chromium-deny-list=^https?://(localhost|0\\.0\\.0\\.0|127\\.|10\\.|192\\.168\\.|169\\.254\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.|\\[::1\\]|\\[[fF][cdCD]|\\[[fF][eE][89aAbB])"
