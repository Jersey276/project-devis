x-service-defaults: &service-defaults
  restart: unless-stopped
  pull_policy: always

x-common-env: &common-env
  TZ: Europe/Paris

x-postgres-build: &postgres-build
  context: ./backend
  dockerfile: Dockerfile.postgres

x-db-common-env: &db-common-env
  <<: *common-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_PASSWORD_FILE: /run/secrets/db_password

x-db-service: &db-service
  <<: *service-defaults
  depends_on:
    postgres-init:
      condition: service_completed_successfully
  secrets:
    - db_password

services:
  front:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/front:${IMAGE_TAG:-latest}
    environment:
      <<: *common-env
      APP_ENV: production
    ports:
      - "${FRONT_PORT:-3001}:3000"
    depends_on:
      - devis-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  devis-gateway:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/gateway:${IMAGE_TAG:-latest}
    environment:
      <<: *common-env
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: devis-schedule
      DB_NAME: schedule
      DB_PASSWORD_FILE: /run/secrets/db_password
      AUTH_SERVICE_ADDRESS: devis-auth:50051
      USER_SERVICE_ADDRESS: devis-user:50052
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      SCHEDULE_SERVICE_ADDRESS: devis-schedule:50056
      EXPORT_SERVICE_ADDRESS: devis-export:50054
      TEMPLATE_SERVICE_ADDRESS: devis-template:50055
      SUBSCRIPTION_SERVICE_ADDRESS: devis-subscription:50057
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET}
      OAUTH_GITHUB_REDIRECT_URL: ${OAUTH_GITHUB_REDIRECT_URL}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_GOOGLE_REDIRECT_URL: ${OAUTH_GOOGLE_REDIRECT_URL}
      OAUTH_MICROSOFT_CLIENT_ID: ${OAUTH_MICROSOFT_CLIENT_ID}
      OAUTH_MICROSOFT_CLIENT_SECRET: ${OAUTH_MICROSOFT_CLIENT_SECRET}
      OAUTH_MICROSOFT_REDIRECT_URL: ${OAUTH_MICROSOFT_REDIRECT_URL}
    ports:
      - "8080:8080"
    secrets:
      - db_password
    depends_on:
      - devis-auth
      - devis-user
      - devis-quote
      - devis-schedule
      - devis-export
      - devis-template
      - devis-subscription

  devis-auth:
    <<: *db-service
    image: ${IMAGE_PREFIX}/auth:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_USER: devis-auth
      DB_NAME: ${AUTH_DB_NAME:-auth}
      USER_SERVICE_ADDRESS: devis-user:50052
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@project-devis.local}
      RESET_PASSWORD_BASE_URL: ${RESET_PASSWORD_BASE_URL:-http://localhost:3001/reset-password}

  devis-user:
    <<: *db-service
    image: ${IMAGE_PREFIX}/users:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_USER: devis-users
      DB_NAME: ${USER_DB_NAME:-users}

  devis-quote:
    <<: *db-service
    image: ${IMAGE_PREFIX}/quote:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_USER: devis-quote
      DB_NAME: ${QUOTE_DB_NAME:-quote}

  devis-schedule:
    <<: *db-service
    image: ${IMAGE_PREFIX}/schedule:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_USER: devis-schedule
      DB_NAME: ${SCHEDULE_DB_NAME:-schedule}
      QUOTE_SERVICE_ADDRESS: devis-quote:50053

  devis-template:
    <<: *db-service
    image: ${IMAGE_PREFIX}/template:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_USER: devis-template
      DB_NAME: ${TEMPLATE_DB_NAME:-template}

  devis-subscription:
    <<: *db-service
    image: ${IMAGE_PREFIX}/subscription:${IMAGE_TAG:-latest}
    environment:
      <<: *db-common-env
      DB_USER: devis-subscription
      DB_NAME: ${SUBSCRIPTION_DB_NAME:-subscription}
      STRIPE_SECRET_KEY_FILE: /run/secrets/stripe_secret_key
      STRIPE_WEBHOOK_SECRET_FILE: /run/secrets/stripe_webhook_secret
      AUTH_SERVICE_ADDRESS: devis-auth:50051
    secrets:
      - db_password
      - stripe_secret_key
      - stripe_webhook_secret

  devis-export:
    <<: *service-defaults
    image: ${IMAGE_PREFIX}/export:${IMAGE_TAG:-latest}
    environment:
      <<: *common-env
      QUOTE_SERVICE_ADDRESS: devis-quote:50053
      USER_SERVICE_ADDRESS: devis-user:50052
      GOTENBERG_ADDRESS: http://gotenberg:3000
    depends_on:
      - devis-quote
      - devis-user
      - gotenberg

  gotenberg:
    <<: *service-defaults
    image: gotenberg/gotenberg:8
    pull_policy: missing
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=30s"
      - "--chromium-deny-list=^https?://(localhost|0\\.0\\.0\\.0|127\\.|10\\.|192\\.168\\.|169\\.254\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.|\\[::1\\]|\\[[fF][cdCD]|\\[[fF][eE][89aAbB])"

  postgres:
    build: *postgres-build
    restart: unless-stopped
    environment:
      POSTGRES_USER: devis-auth
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: auth
      TZ: Europe/Paris
    volumes:
      - postgres:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$(cat /run/secrets/db_password) psql -U devis-auth -d auth -c 'SELECT 1' -q --no-password > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  # Idempotent DB/role provisioning. Runs on every compose up against the
  # live cluster, so adding a new database does not require wiping the volume.
  postgres-init:
    build: *postgres-build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      POSTGRES_USER: devis-auth
    secrets:
      - db_password
    entrypoint: ["/docker-entrypoint-initdb.d/init.sh"]
    restart: "no"

secrets:
  db_password:
    file: backend/secrets/postgres_pswd.txt
  stripe_secret_key:
    file: backend/secrets/stripe_secret_key.txt
  stripe_webhook_secret:
    file: backend/secrets/stripe_webhook_secret.txt

volumes:
  postgres:
